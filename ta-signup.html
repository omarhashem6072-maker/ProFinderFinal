<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TA Sign Up - Profinder</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo" style="text-decoration:none; color:inherit;">Profinder</a>
      <nav class="nav-links">
        <a href="admin-login.html">Admin Login</a>
      </nav>
    </div>
  </header>

  <div class="main-container">
    <main class="main-content">
      <div class="login-container">
        <h1>Sign up</h1>

        <div id="signup-error" class="login-error"></div>
        <form id="ta-signup-form">
          <div class="form-group">
            <label for="first-name">First name</label>
            <input type="text" id="first-name" required autocomplete="given-name" placeholder="First name" />
          </div>
          <div class="form-group">
            <label for="last-name">Last name</label>
            <input type="text" id="last-name" required autocomplete="family-name" placeholder="Last name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email" placeholder="Email" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="new-password" placeholder="Password" />
          </div>
          <div class="form-group">
            <label for="code">6-digit code</label>
            <input type="text" id="code" required inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="Enter the 6-digit code you were given" />
          </div>
          <button type="submit" class="submit-btn" style="width: 100%;">Create account</button>
        </form>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>&copy; 2025 Profinder - Automated Office Hour Board</p>
  </footer>

  <script>
    (function () {
      var form = document.getElementById('ta-signup-form');
      var errEl = document.getElementById('signup-error');
      form.addEventListener('submit', async function (ev) {
        ev.preventDefault();
        errEl.classList.remove('visible');
        errEl.textContent = '';

        var btn = form.querySelector('button[type="submit"]');
        if (btn) { btn.disabled = true; btn.textContent = 'Creating...'; }

        var payload = {
          firstName: document.getElementById('first-name').value.trim(),
          lastName: document.getElementById('last-name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          code: document.getElementById('code').value.trim()
        };

        try {
          var res = await fetch('/api/auth/ta-signup', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          var data = null;
          try { data = await res.json(); } catch (e) {}

          if (!res.ok) {
            errEl.textContent = (data && data.error) ? data.error : ('Signup failed (' + res.status + ')');
            errEl.classList.add('visible');
            if (btn) { btn.disabled = false; btn.textContent = 'Create account'; }
            return;
          }

          try {
            sessionStorage.setItem('profinder_admin_session', 'true');
            if (data && data.firstName) {
              sessionStorage.setItem('profinder_admin_first_name', data.firstName);
            }
          } catch (e) {}

          window.location.replace('admin.html');
        } catch (e) {
          errEl.textContent = 'Signup failed. Is the server running?';
          errEl.classList.add('visible');
          if (btn) { btn.disabled = false; btn.textContent = 'Create account'; }
        }
      });
    })();
  </script>
</body>
</html>
