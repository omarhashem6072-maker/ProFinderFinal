<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Profinder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <script src="js/auth.js"></script>
    <script>
        (function() {
            if (window.isAdminLoggedIn && window.isAdminLoggedIn()) {
                window.checkAdminSession && window.checkAdminSession(function(ok) {
                    if (!ok) window.location.replace('admin-login.html');
                });
                return;
            }
            window.checkAdminSession && window.checkAdminSession(function(ok) {
                if (!ok) window.location.replace('admin-login.html');
            });
        })();
    </script>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>📚 Profinder</h1>
            </div>
            <div class="search-bar">
                <input type="text" id="global-search" placeholder="Search professors, courses...">
                <button onclick="handleSearch()">🔍</button>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="office-hours.html" class="nav-link">Office Hours</a>
                <a href="calendar.html" class="nav-link">Calendar</a>
                <a href="admin-login.html" class="nav-link active">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-container">
        <main class="main-content admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
                <div style="display:flex; flex-direction:column; gap:0.25rem;">
                    <h1 style="margin: 0;">Admin Panel</h1>
                    <div id="welcome-banner" style="color:#374151;">Welcome<span id="welcome-name"></span></div>
                </div>
                <button type="button" onclick="if(window.logoutFromApi) { window.logoutFromApi(function() { window.location.href = 'admin-login.html'; }); } else { if(window.clearAdminSession) window.clearAdminSession(); window.location.href = 'admin-login.html'; }" class="db-btn" style="background-color: #666;">Log out</button>
            </div>

            <!-- File Upload Section -->
            <section class="admin-section">
                <h2>Upload Course Outlines</h2>
                <div class="upload-area">
                    <input type="file" id="file-upload" accept=".pdf,.xlsx,.csv" multiple>
                    <label for="file-upload" class="upload-label">
                        📁 Choose Files (PDF, Excel, CSV)
                    </label>
                    <button onclick="uploadFiles()" class="upload-btn">Upload Files</button>
                    <div id="upload-status"></div>
                </div>
            </section>

            <!-- Manual Data Entry -->
            <section class="admin-section">
                <h2>Manual Data Entry</h2>
                <form id="manual-entry-form" onsubmit="addManualEntry(event)">
                    <div class="form-group">
                        <label for="prof-name">Professor Name:</label>
                        <input type="text" id="prof-name" required>
                    </div>
                    <div class="form-group">
                        <label for="course-code">Course Code:</label>
                        <input type="text" id="course-code" required>
                    </div>
                    <div class="form-group">
                        <label for="course-name">Course Name:</label>
                        <input type="text" id="course-name" required>
                    </div>
                    <div class="form-group">
                        <label for="day">Day:</label>
                        <select id="day" required>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="time-start">Start Time:</label>
                        <input type="time" id="time-start" required>
                    </div>
                    <div class="form-group">
                        <label for="time-end">End Time:</label>
                        <input type="time" id="time-end" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Location:</label>
                        <input type="text" id="location" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="professor@torontomu.ca">
                    </div>
                    <button type="submit" class="submit-btn">Add Office Hour</button>
                </form>
            </section>

            <!-- Database Management -->
            <section class="admin-section">
                <h2>Database Management</h2>
                <div class="db-controls">
                    <button onclick="refreshDatabase()" class="db-btn">Refresh Database</button>
                    <button onclick="exportData()" class="db-btn">Export Data</button>
                    <button onclick="clearDatabase()" class="db-btn danger">Clear All Data</button>
                </div>
                <div id="db-status"></div>
            </section>

            <!-- Update Scheduler -->
            <section class="admin-section">
                <h2>Update Scheduler</h2>
                <div class="scheduler-controls">
                    <label>
                        <input type="checkbox" id="auto-update" onchange="toggleAutoUpdate()">
                        Enable Weekly Auto-Updates
                    </label>
                    <div class="scheduler-info">
                        <p>Next scheduled update: <span id="next-update">Not scheduled</span></p>
                        <button onclick="triggerManualUpdate()" class="update-btn">Trigger Manual Update</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 Profinder - Automated Office Hour Board</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
