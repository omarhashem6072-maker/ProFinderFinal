services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: profinder
      MYSQL_ROOT_PASSWORD: rootpassword
    # Host 3307 avoids conflict with MySQL already running on Windows (port 3306)
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: server/ProFinderDocker
    environment:
      PROFINDER_DB_HOST: db
      PROFINDER_DB_PORT: "3306"
      PROFINDER_DB_USER: root
      PROFINDER_DB_PASSWORD: rootpassword
      PROFINDER_DB_NAME: profinder
      SESSION_SECRET: change-me-in-production
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    # Create tables + seed on first run so /api/* works without manual Workbench step
    command: ["sh", "-c", "node scripts/initDb.js && node server.js"]

volumes:
  dbdata:
